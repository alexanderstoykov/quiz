<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Тест 40БТ — 100 въпроса</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="40БТ" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f1419" />
  <meta name="robots" content="noindex, nofollow" />
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e8eef4;
      --muted: #8b9cb0;
      --accent: #3d8fd1;
      --accent-dim: #2a6a9a;
      --ok: #3dcc7a;
      --bad: #e85d5d;
      --radius: 12px;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      padding: max(12px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right))
        max(20px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 650;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }
    p.lead { color: var(--muted); margin: 0 0 16px; font-size: 0.95rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
    }
    .hidden { display: none !important; }
    button {
      font: inherit;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      min-height: 44px;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
      font-weight: 600;
    }
    .btn-primary:active { background: var(--accent-dim); }
    .btn-secondary {
      background: var(--border);
      color: var(--text);
      flex: 1;
    }
    .btn-ghost {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--border);
      width: 100%;
    }
    #screen-quiz {
      padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
    }
    .quiz-nav-fixed {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 10px max(16px, env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom, 0px))
        max(16px, env(safe-area-inset-left));
      background: var(--bg);
      border-top: 1px solid var(--border);
      box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.35);
    }
    .quiz-nav-fixed .quiz-nav-inner {
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
      display: flex;
      gap: 10px;
    }
    .quiz-nav-fixed .btn-secondary {
      flex: 1;
    }
    .progress-wrap {
      margin-bottom: 12px;
    }
    .progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.2s ease;
    }
    .meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .q-header-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 14px;
    }
    .q-text {
      flex: 1;
      min-width: 0;
      font-size: 1rem;
      margin: 0;
      white-space: pre-wrap;
    }
    .q-images {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;
    }
    .q-images img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .opt {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.15);
      cursor: pointer;
    }
    .opt:has(input:checked) {
      border-color: var(--accent);
      background: rgba(61, 143, 209, 0.12);
    }
    .opt input {
      margin-top: 3px;
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }
    .opt span { flex: 1; font-size: 0.92rem; }
    .quiz-actions-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      align-items: stretch;
    }
    .quiz-actions-row .btn-ghost-sm {
      flex: 1;
      width: auto;
      min-height: 36px;
      padding: 6px 8px;
      font-size: 0.78rem;
      font-weight: 500;
      line-height: 1.25;
    }
    .sticky-footer {
      position: sticky;
      bottom: 0;
      padding-top: 10px;
      padding-bottom: env(safe-area-inset-bottom);
      background: linear-gradient(transparent, var(--bg) 12px);
      margin-top: 8px;
    }
    #screen-review .review-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin: 12px 0;
    }
    .review-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
    }
    .review-cell.answered { border-color: var(--accent); color: var(--accent); }
    .review-cell.unanswered { opacity: 0.55; }
    .result-score {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin: 8px 0;
    }
    .pass { color: var(--ok); }
    .fail { color: var(--bad); }
    .sheet-tag {
      display: inline-block;
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 6px;
      background: var(--border);
      color: var(--muted);
      margin-bottom: 8px;
    }
    .btn-reveal {
      flex-shrink: 0;
      align-self: flex-start;
      margin: 0;
      padding: 2px 6px;
      min-height: 0;
      line-height: 1.25;
      font: inherit;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      border-radius: 4px;
      border: 1px dashed var(--muted);
      background: rgba(0, 0, 0, 0.2);
      color: var(--muted);
      white-space: nowrap;
    }
    .btn-reveal:active { opacity: 0.85; }
    .btn-reveal.is-on {
      border-style: solid;
      border-color: var(--ok);
      color: var(--ok);
      background: rgba(61, 204, 122, 0.12);
    }
    .opt.is-reveal {
      border-color: var(--ok);
      background: rgba(61, 204, 122, 0.12);
    }
    #screen-login {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
    }
    #screen-login .card {
      width: 100%;
      max-width: 340px;
    }
    #screen-login h1 { text-align: center; }
    #screen-login input {
      display: block;
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.2);
      color: var(--text);
      font: inherit;
      font-size: 0.95rem;
    }
    #screen-login input:focus {
      outline: none;
      border-color: var(--accent);
    }
    #login-error {
      color: var(--bad);
      font-size: 0.85rem;
      margin-bottom: 10px;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div id="screen-login">
    <div class="card">
      <h1>Тест 40БТ</h1>
      <input type="text" id="login-user" placeholder="Email" autocomplete="username" />
      <input type="password" id="login-pass" placeholder="Парола" autocomplete="current-password" />
      <div id="login-error"></div>
      <button type="button" class="btn-primary" id="btn-login">Вход</button>
    </div>
  </div>

  <div id="screen-intro" class="hidden">
    <h1>Тест 40БТ</h1>
    <p class="lead">100 случайни въпроса от всички листове освен първия; броят по лист е пропорционален. 1 точка за верен отговор. Тестът е успешен при повече от 90 точки. Можеш да сменяш отговорите до финалното изпращане.</p>
    <div class="card" id="intro-stats"></div>
    <button type="button" class="btn-primary" id="btn-start">Започни теста</button>
  </div>

  <div id="screen-quiz" class="hidden">
    <div class="progress-wrap">
      <div class="meta"><span id="quiz-progress-text"></span></div>
      <div class="progress-bar"><div class="progress-fill" id="quiz-progress-fill"></div></div>
    </div>
    <div class="quiz-actions-row">
      <button type="button" class="btn-ghost btn-ghost-sm" id="btn-overview">Преглед на всички</button>
      <button type="button" class="btn-ghost btn-ghost-sm" id="btn-to-review">Към предаване</button>
    </div>
    <div class="card">
      <div class="sheet-tag" id="quiz-sheet"></div>
      <div class="q-header-row">
        <div class="q-text" id="quiz-question"></div>
        <button type="button" class="btn-reveal" id="btn-reveal" title="Покажи / скрий верния отговор">Покажи</button>
      </div>
      <div class="q-images" id="quiz-images" hidden></div>
      <div class="options" id="quiz-options"></div>
    </div>
    <nav class="quiz-nav-fixed" aria-label="Навигация между въпроси">
      <div class="quiz-nav-inner">
        <button type="button" class="btn-secondary" id="btn-prev">Назад</button>
        <button type="button" class="btn-secondary" id="btn-next">Напред</button>
      </div>
    </nav>
  </div>

  <div id="screen-review" class="hidden">
    <h1>Преглед</h1>
    <p class="lead">Натисни номер за редакция. След това предай теста.</p>
    <div class="review-grid" id="review-grid"></div>
    <p class="meta" id="review-unanswered"></p>
    <div class="sticky-footer">
      <button type="button" class="btn-primary" id="btn-submit">Предай теста</button>
      <button type="button" class="btn-ghost" id="btn-back-quiz" style="margin-top:10px">Обратно към въпросите</button>
    </div>
  </div>

  <div id="screen-result" class="hidden">
    <h1>Резултат</h1>
    <div class="card">
      <div class="result-score" id="result-score"></div>
      <p id="result-msg"></p>
      <p class="meta" id="result-detail"></p>
    </div>
    <button type="button" class="btn-primary" id="btn-restart">Нов тест</button>
  </div>

  <script src="questions.js"></script>
  <script>
(function () {
  const TOTAL = 100;
  const PASS_THRESHOLD = 90;
  function assertData() {
    if (!window.QUIZ_DATA || !window.QUIZ_DATA.bySheet) {
      document.body.innerHTML = "<p style='padding:24px'>Липсват данни. Пусни <code>python3 build_questions.py</code> до <code>40BT.xlsx</code> в същата папка.</p>";
      throw new Error("QUIZ_DATA");
    }
  }

  function shuffleInPlace(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  /** Largest remainder: integer counts summing to total, proportional to weights. */
  function allocateProportional(counts, total) {
    const names = Object.keys(counts);
    const sum = names.reduce((s, k) => s + counts[k], 0);
    const out = {};
    if (sum === 0) {
      names.forEach((k) => { out[k] = 0; });
      return out;
    }
    const exact = names.map((k) => (total * counts[k]) / sum);
    const floors = exact.map((x) => Math.floor(x));
    let leftover = total - floors.reduce((a, b) => a + b, 0);
    const order = exact.map((x, i) => ({ i, rem: x - floors[i] })).sort((a, b) => b.rem - a.rem);
    names.forEach((k, idx) => { out[k] = floors[idx]; });
    for (let j = 0; j < leftover; j++) {
      const sheetName = names[order[j].i];
      out[sheetName] += 1;
    }
    return out;
  }

  function buildRound() {
    const bySheet = window.QUIZ_DATA.bySheet;
    const counts = {};
    for (const name of Object.keys(bySheet)) {
      counts[name] = bySheet[name].length;
    }
    const alloc = allocateProportional(counts, TOTAL);
    const picked = [];
    for (const sheetName of Object.keys(alloc)) {
      const n = alloc[sheetName];
      if (n <= 0) continue;
      const pool = bySheet[sheetName].slice();
      shuffleInPlace(pool);
      for (let i = 0; i < n && i < pool.length; i++) {
        picked.push({ ...pool[i] });
      }
    }
    if (picked.length !== TOTAL) {
      console.warn("picked", picked.length, "expected", TOTAL);
    }
    shuffleInPlace(picked);
    return picked;
  }

  let round = [];
  let answers = [];
  let revealed = [];
  let idx = 0;

  const screens = {
    intro: document.getElementById("screen-intro"),
    quiz: document.getElementById("screen-quiz"),
    review: document.getElementById("screen-review"),
    result: document.getElementById("screen-result"),
  };

  function show(name) {
    Object.values(screens).forEach((el) => el.classList.add("hidden"));
    screens[name].classList.remove("hidden");
  }

  function renderIntroStats() {
    const bySheet = window.QUIZ_DATA.bySheet;
    const parts = Object.keys(bySheet).map((k) => {
      return "<strong>" + escapeHtml(k) + "</strong>: " + bySheet[k].length;
    });
    var skip = window.QUIZ_DATA.skippedFirstSheet;
    var skipLine = skip
      ? "<p style='margin:0 0 8px;color:var(--muted);font-size:0.85rem'>Без лист: <strong>" + escapeHtml(skip) + "</strong></p>"
      : "";
    document.getElementById("intro-stats").innerHTML =
      skipLine +
      "<p style='margin:0;font-size:0.9rem;line-height:1.6'>" + parts.join("<br/>") + "</p>" +
      "<p style='margin:12px 0 0;color:var(--muted);font-size:0.85rem'>Общо " + window.QUIZ_DATA.bank.length + " въпроса в банката.</p>";
  }

  function escapeHtml(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  function renderQuestion() {
    const q = round[idx];
    const n = round.length;
    document.getElementById("quiz-progress-text").textContent =
      "Въпрос " + (idx + 1) + " / " + n;
    document.getElementById("quiz-progress-fill").style.width = ((idx + 1) / n) * 100 + "%";
    document.getElementById("quiz-sheet").textContent = q.sheet;
    document.getElementById("quiz-question").textContent = q.question;
    var imgWrap = document.getElementById("quiz-images");
    imgWrap.innerHTML = "";
    if (q.images && q.images.length) {
      imgWrap.hidden = false;
      for (var ii = 0; ii < q.images.length; ii++) {
        var im = document.createElement("img");
        im.src = q.images[ii];
        im.alt = "";
        im.loading = "lazy";
        im.decoding = "async";
        imgWrap.appendChild(im);
      }
    } else {
      imgWrap.hidden = true;
    }
    const opts = document.getElementById("quiz-options");
    opts.innerHTML = "";
    const sel = answers[idx];
    const showReveal = revealed[idx];
    for (let o = 0; o < q.options.length; o++) {
      const id = "opt-" + idx + "-" + o;
      const lab = document.createElement("label");
      lab.className = "opt" + (showReveal && o === q.correctIndex ? " is-reveal" : "");
      lab.setAttribute("for", id);
      const inp = document.createElement("input");
      inp.type = "radio";
      inp.name = "q" + idx;
      inp.id = id;
      inp.value = String(o);
      if (sel === o) inp.checked = true;
      inp.addEventListener("change", () => {
        answers[idx] = o;
      });
      const span = document.createElement("span");
      span.appendChild(document.createTextNode(q.options[o] || ""));
      lab.appendChild(inp);
      lab.appendChild(span);
      opts.appendChild(lab);
    }
    var revBtn = document.getElementById("btn-reveal");
    revBtn.textContent = showReveal ? "Скрий" : "Покажи";
    revBtn.classList.toggle("is-on", showReveal);
    revBtn.setAttribute("aria-pressed", showReveal ? "true" : "false");
    document.getElementById("btn-prev").disabled = idx === 0;
    document.getElementById("btn-next").disabled = idx >= n - 1;
  }

  function renderReviewGrid() {
    const grid = document.getElementById("review-grid");
    grid.innerHTML = "";
    let unanswered = 0;
    for (let i = 0; i < round.length; i++) {
      const cell = document.createElement("button");
      cell.type = "button";
      cell.className = "review-cell" + (answers[i] !== null && answers[i] !== undefined ? " answered" : " unanswered");
      cell.textContent = i + 1;
      cell.addEventListener("click", () => {
        idx = i;
        show("quiz");
        renderQuestion();
      });
      grid.appendChild(cell);
      if (answers[i] === null || answers[i] === undefined) unanswered++;
    }
    document.getElementById("review-unanswered").textContent =
      unanswered ? "Без отговор: " + unanswered + " въпроса." : "Всички въпроси имат избран отговор.";
  }

  function score() {
    let s = 0;
    for (let i = 0; i < round.length; i++) {
      if (answers[i] === round[i].correctIndex) s++;
    }
    return s;
  }

  document.getElementById("btn-start").addEventListener("click", () => {
    assertData();
    round = buildRound();
    answers = round.map(() => null);
    revealed = round.map(() => false);
    idx = 0;
    show("quiz");
    renderQuestion();
  });

  document.getElementById("btn-prev").addEventListener("click", () => {
    if (idx > 0) {
      idx--;
      renderQuestion();
    }
  });
  document.getElementById("btn-next").addEventListener("click", () => {
    if (idx < round.length - 1) {
      idx++;
      renderQuestion();
    }
  });
  document.addEventListener("keydown", function (e) {
    if (screens.quiz.classList.contains("hidden")) return;
    if (e.key === "ArrowLeft") {
      e.preventDefault();
      if (idx > 0) {
        idx--;
        renderQuestion();
      }
    } else if (e.key === "ArrowRight") {
      e.preventDefault();
      if (idx < round.length - 1) {
        idx++;
        renderQuestion();
      }
    }
  });
  document.getElementById("btn-reveal").addEventListener("click", () => {
    revealed[idx] = !revealed[idx];
    renderQuestion();
  });
  document.getElementById("btn-overview").addEventListener("click", () => {
    renderReviewGrid();
    show("review");
  });
  document.getElementById("btn-to-review").addEventListener("click", () => {
    renderReviewGrid();
    show("review");
  });
  document.getElementById("btn-back-quiz").addEventListener("click", () => {
    show("quiz");
    renderQuestion();
  });
  document.getElementById("btn-submit").addEventListener("click", () => {
    const s = score();
    document.getElementById("result-score").textContent = s + " / " + round.length;
    document.getElementById("result-score").className = "result-score " + (s > PASS_THRESHOLD ? "pass" : "fail");
    const pass = s > PASS_THRESHOLD;
    document.getElementById("result-msg").innerHTML = pass
      ? "<strong>Успешен тест.</strong> Над " + PASS_THRESHOLD + " точки."
      : "<strong>Неуспешен тест.</strong> Нужни са повече от " + PASS_THRESHOLD + " точки.";
    document.getElementById("result-detail").textContent =
      "Праг за успех: повече от " + PASS_THRESHOLD + " верни отговора от " + TOTAL + ".";
    show("result");
  });

  document.getElementById("btn-restart").addEventListener("click", () => {
    show("intro");
  });

  try {
    assertData();
    renderIntroStats();
  } catch (e) {
    /* already replaced body */
  }
})();
  </script>
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }

  (function() {
    // hint: email + ЕГН
    var VALID_USER_HASH = '4bea95b3b1e87e65593cdcbd9aba369de92859b82582466811475482c48e5938';
    var VALID_PASS_HASH = '5e673eb81b62f5a56a8c68b49df1223dd1f2cd2eddc2155073cf002663c22cc0';
    var SESSION_KEY = 'quiz_auth';

    async function sha256(str) {
      var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
    }

    function unlock() {
      document.getElementById('screen-login').classList.add('hidden');
      document.getElementById('screen-intro').classList.remove('hidden');
    }

    if (sessionStorage.getItem(SESSION_KEY) === '1') {
      unlock();
    }

    document.getElementById('btn-login').addEventListener('click', async function() {
      var user = document.getElementById('login-user').value.trim();
      var pass = document.getElementById('login-pass').value;
      var userHash = await sha256(user);
      var passHash = await sha256(pass);
      if (userHash === VALID_USER_HASH && passHash === VALID_PASS_HASH) {
        sessionStorage.setItem(SESSION_KEY, '1');
        unlock();
      } else {
        document.getElementById('login-error').textContent = 'Грешно потребителско име или парола.';
      }
    });

    document.getElementById('login-pass').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('btn-login').click();
    });
  })();
  </script>
</body>
</html>
